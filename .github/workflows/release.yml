name: Release

on:
  push:
    tags:
      - "v*"
  # Reusable entry point: auto-release.yml calls this in the SAME run after it
  # bumps + tags on green master. A tag pushed by the bot's GITHUB_TOKEN would
  # NOT trigger this workflow on its own (default-token pushes never fan out to
  # other workflows), so the auto flow invokes us directly via workflow_call.
  workflow_call:
    inputs:
      tagName:
        description: "Tag to build and release (e.g. v0.2.6). Required for workflow_call."
        required: true
        type: string
      publish:
        description: "Publish the release (true) instead of leaving it a draft (false)."
        required: false
        default: false
        type: boolean

jobs:
  release:
    permissions:
      # Required so tauri-action can create the draft release and upload bundles.
      # The default GITHUB_TOKEN is sufficient for same-repo releases — no extra secret needed.
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            # Bundles: .app + .dmg. Builds are UNSIGNED (no signing certs configured),
            # so Gatekeeper will quarantine them: users right-click the .app and choose
            # Open on first launch. Signing/notarization can be added later via secrets.
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    # Windows is a CANARY: compatibility work is NOT done (macOS-specific menu APIs,
    # CLI installer, path handling under audit). This job reports what breaks without
    # failing the release. Any Windows installer it produces is expressly experimental.
    continue-on-error: ${{ matrix.platform == 'windows-latest' }}

    steps:
      # Build the exact tagged commit. On a manual tag push this is refs/tags/v*
      # (github.ref); on a workflow_call the caller passes the freshly created tag.
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tagName || github.ref }}

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v1
        env:
          # Default token — sufficient for creating a release in this same repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tagName || github.ref_name }}
          releaseName: "gitrx v__VERSION__"
          # Manual tag pushes stay drafts; an auto-release call with publish=true
          # publishes. (!null -> true, so the push path defaults to a draft.)
          releaseDraft: ${{ !inputs.publish }}
          prerelease: false
          args: ${{ matrix.args }}
